server {
    listen 80;

    server_name _;

    # React SPA（ホストで `npm run build` した client/dist をマウント）
    root /var/www/client;
    index index.html;

    # SPA: 実ファイルが無ければ index.html に fallback（React Router の deep link 対応）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Laravel API: /api 以下は PHP-FPM へ内部リダイレクト
    # ※ REQUEST_URI は元のまま渡るので Laravel のルーティングは正常に動く
    location ^~ /api/ {
        try_files $uri /index.php?$query_string;
    }

    # Laravel Sanctum CSRF Cookie
    location ^~ /sanctum/ {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        root /var/www/html/public;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

}
